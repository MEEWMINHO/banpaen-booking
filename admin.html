<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ระบบจองห้องประชุม ทต.บ้านแป้น</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --walnut:#4A3728;--sand:#EAE3D5;--cream:#F5F0E8;--terr:#C2622A;--terrlt:#F0DDD3;
  --sage:#3A6B40;--sagelt:#D8EAD9;--bark:#9C8370;--dust:#B8AC9C;--linen:#DDD5C4;
  --red:#C0392B;--redlt:#FADBD8;--gold:#B08940;--goldlt:#F0E4C0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Sarabun",sans-serif;background:var(--cream);color:#3A2C1E;font-size:15px;}

.topbar{background:var(--walnut);border-bottom:3px solid var(--terr);padding:12px 20px;display:flex;align-items:center;gap:14px;}
.logo-sm{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.2);background:#fff;flex-shrink:0;}
.logo-sm img{width:100%;height:100%;object-fit:cover;}
.topbar-title{flex:1;}
.topbar-h{font-size:14px;font-weight:600;color:#fff;}
.topbar-sub{font-size:11px;color:var(--dust);}
.topbar-user{font-size:12px;color:var(--dust);text-align:right;}
.logout-btn{font-size:12px;color:var(--dust);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 12px;cursor:pointer;margin-top:4px;display:block;}
.logout-btn:hover{background:rgba(255,255,255,.2);}

.login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 70px);padding:20px;}
.login-card{background:#fff;border:1px solid var(--linen);border-radius:16px;padding:32px 28px;width:100%;max-width:380px;text-align:center;}
.login-logo{width:72px;height:72px;border-radius:50%;overflow:hidden;margin:0 auto 16px;border:3px solid var(--linen);}
.login-logo img{width:100%;height:100%;object-fit:cover;}
.login-title{font-size:16px;font-weight:600;color:var(--walnut);margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--bark);margin-bottom:24px;}
.lg{margin-bottom:14px;text-align:left;}
.ll{font-size:11px;font-weight:500;color:var(--bark);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:block;}
.li{width:100%;padding:10px 14px;font-size:14px;font-family:"Sarabun",sans-serif;border-radius:10px;border:1px solid var(--linen);background:#FAFAF8;color:#3A2C1E;}
.li:focus{outline:none;border-color:var(--walnut);}
.login-btn{width:100%;padding:12px;font-size:14px;font-weight:600;font-family:"Sarabun",sans-serif;background:var(--terr);color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:#A3501F;}
.login-err{display:none;background:var(--redlt);color:var(--red);border:1px solid #F1948A;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}

.main-screen{display:none;}

.summary-bar{background:var(--walnut);padding:0 20px 16px;}
.summary-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.s-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;}
.s-num{font-size:22px;font-weight:600;color:#fff;}
.s-lbl{font-size:11px;color:var(--dust);margin-top:1px;}

.content{max-width:1100px;margin:0 auto;padding:20px;}

.tab-row{display:flex;gap:2px;margin-bottom:18px;background:var(--sand);border-radius:10px;padding:4px;}
.tab{flex:1;padding:8px;font-size:13px;font-weight:500;font-family:"Sarabun",sans-serif;border:none;border-radius:8px;background:transparent;color:var(--bark);cursor:pointer;transition:all .2s;}
.tab.active{background:#fff;color:var(--walnut);box-shadow:0 1px 3px rgba(0,0,0,.1);}

.filter-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.filter-sel{padding:8px 12px;font-size:13px;font-family:"Sarabun",sans-serif;border-radius:8px;border:1px solid var(--linen);background:#fff;color:#3A2C1E;cursor:pointer;}

.table-wrap{background:#fff;border:1px solid var(--linen);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{background:var(--sand);padding:11px 14px;font-size:11px;font-weight:600;color:var(--bark);text-transform:uppercase;letter-spacing:.05em;text-align:left;}
td{padding:12px 14px;font-size:13px;color:#3A2C1E;border-top:1px solid var(--linen);vertical-align:middle;}
tr:hover td{background:#FAFAF8;}
.status-pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap;}
.pill-pending{background:var(--goldlt);color:#7A5010;}
.pill-approved{background:var(--sagelt);color:var(--sage);}
.pill-rejected{background:var(--redlt);color:var(--red);}
.action-btns{display:flex;gap:6px;}
.abtn{font-size:12px;padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-family:"Sarabun",sans-serif;font-weight:500;}
.abtn-approve{background:var(--sagelt);color:var(--sage);}
.abtn-approve:hover{background:#B8D9BA;}
.abtn-reject{background:var(--redlt);color:var(--red);}
.abtn-reject:hover{background:#F5B7B1;}
.abtn-view{background:var(--goldlt);color:#7A5010;}
.abtn-view:hover{background:#E8D4A0;}

.empty-state{text-align:center;padding:48px 20px;color:var(--bark);}
.empty-icon{font-size:40px;margin-bottom:10px;}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(74,55,40,.5);align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;color:var(--walnut);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--linen);display:flex;justify-content:space-between;align-items:center;}
.modal-close{font-size:20px;cursor:pointer;color:var(--bark);background:none;border:none;}
.detail-row{display:flex;gap:8px;margin-bottom:10px;}
.detail-label{font-size:11px;font-weight:600;color:var(--bark);text-transform:uppercase;letter-spacing:.04em;min-width:80px;padding-top:2px;}
.detail-val{font-size:14px;color:#3A2C1E;flex:1;}
.modal-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--linen);}
.mbtn{flex:1;padding:11px;font-size:14px;font-weight:600;font-family:"Sarabun",sans-serif;border:none;border-radius:10px;cursor:pointer;}
.mbtn-approve{background:var(--sage);color:#fff;}
.mbtn-approve:hover{background:#2A5330;}
.mbtn-reject{background:var(--red);color:#fff;}
.mbtn-reject:hover{background:#A93226;}
.mbtn-cancel{background:var(--sand);color:var(--bark);}

.toast{position:fixed;bottom:24px;right:24px;background:var(--walnut);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;}

@media(max-width:700px){
  .summary-inner{grid-template-columns:1fr 1fr;}
  .content{padding:12px;}
  table th:nth-child(3),table td:nth-child(3),
  table th:nth-child(4),table td:nth-child(4){display:none;}
}
</style>
</head>

      <div class="s-card"><div class="s-num" id="sApproved">0</div><div class="s-lbl">อนุมัติแล้ว</div></div>
      <div class="s-card"><div class="s-num" id="sRejected">0</div><div class="s-lbl">ปฏิเสธ</div></div>
    </div>
  </div>

  <div class="content">
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('all',this)">ทั้งหมด</button>
      <button class="tab" onclick="switchTab('pending',this)">รอการอนุมัติ</button>
      <button class="tab" onclick="switchTab('approved',this)">อนุมัติแล้ว</button>
      <button class="tab" onclick="switchTab('rejected',this)">ปฏิเสธ</button>
    </div>

    <div class="filter-row">
      <select class="filter-sel" id="filterRoom" onchange="renderTable()">
        <option value="">ทุกห้อง</option>
        <option>ห้องประชุมสภา</option>
        <option>ศาลาประชาคมเมือง</option>
      </select>
      <input type="date" class="filter-sel" id="filterDate" onchange="renderTable()" style="cursor:pointer">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>เลขที่</th>
            <th>ผู้จอง / กอง</th>
            <th>ห้อง</th>
            <th>วันที่ / เวลา</th>
            <th>สถานะ</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="bookingTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal-box">
    <div class="modal-title">
      <span>รายละเอียดคำขอจอง</span>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// !! แก้ตรงนี้ !! ใส่ URL จาก Google Apps Script ที่ Deploy แล้ว
// ============================================================
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzj-hVGSJFKQ0SpCoK1a8YgRVbfs70cLR2-muJ2dY0C_nvp5no9GbD-5xJxLP6Lw61a/exec";

// รหัสผ่าน Admin (ในระบบจริงให้เก็บใน Apps Script แทน)
var ADMIN_USERS = {
  "admin": "banpaen2567",
  "pakled": "pakled1234"
};

var currentTab = "all";
var bookings = [];
var selectedBooking = null;

// ---- LOGIN ----
function doLogin(){
  var u=document.getElementById("lgUser").value.trim();
  var p=document.getElementById("lgPass").value;
  if(ADMIN_USERS[u]&&ADMIN_USERS[u]===p){
    sessionStorage.setItem("admin",u);
    showMain(u);
  } else {
    document.getElementById("loginErr").style.display="block";
  }
}
function doLogout(){
  sessionStorage.removeItem("admin");
  document.getElementById("mainScreen").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("topbarUser").style.display="none";
  document.getElementById("lgPass").value="";
}
function showMain(u){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";
  document.getElementById("topbarUser").style.display="block";
  document.getElementById("adminName").textContent="ผู้ใช้: "+u;
  loadBookings();
}
window.onload=function(){
  var u=sessionStorage.getItem("admin");
  if(u)showMain(u);
  var today=new Date(),y=today.getFullYear(),m=String(today.getMonth()+1).padStart(2,"0"),d=String(today.getDate()).padStart(2,"0");
  // ไม่ set วันที่อัตโนมัติ เพื่อให้เห็นทุกรายการ
};

// ---- LOAD DATA ----
function loadBookings(){
  // ใช้ script tag (JSONP) เพื่อหลีกเลี่ยง CORS
  var old = document.getElementById('jsonp_script');
  if(old) old.parentNode.removeChild(old);

  var script = document.createElement('script');
  script.id = 'jsonp_script';
  script.src = APPS_SCRIPT_URL + '?action=list&callback=receiveBookings&t=' + Date.now();
  document.head.appendChild(script);

  // fallback 6 วินาที
  setTimeout(function(){
    if(bookings.length===0){
      bookings=getDemoData();
      updateSummary();
      renderTable();
      showToast("⚠️ โหลดข้อมูลจริงไม่ได้ แสดงข้อมูลตัวอย่าง");
    }
  }, 6000);
}

function getDemoData(){
  var today=new Date(),y=today.getFullYear(),m=String(today.getMonth()+1).padStart(2,"0"),d=String(today.getDate()).padStart(2,"0");
  var todayStr=y+"-"+m+"-"+d;
  return [
    {id:"BP-001",name:"นางสาวสมใจ ดีงาม",tel:"081-234-5678",dept:"สำนักปลัด",room:"ห้องประชุมสภา",date:todayStr,start:"09:00",end:"11:00",email:"",note:"จัดโต๊ะแบบโรงเรียน โปรเจคเตอร์",status:"pending",ts:"2568-06-12 08:30"},
    {id:"BP-002",name:"นายวิชัย ใจดี",tel:"089-876-5432",dept:"กองคลัง",room:"ศาลาประชาคมเมือง",date:todayStr,start:"13:00",end:"16:00",email:"wichai@email.com",note:"ไมค์ลอย 2 ตัว เครื่องเสียง",status:"approved",ts:"2568-06-12 07:15"},
    {id:"BP-003",name:"นางมาลี รักดี",tel:"062-111-2222",dept:"กองการศึกษา",room:"ห้องประชุมสภา",date:"2568-06-13",start:"10:00",end:"12:00",email:"",note:"จัดโต๊ะกลม 20 ที่",status:"pending",ts:"2568-06-11 16:45"},
    {id:"BP-004",name:"นายอนันต์ ทองดี",tel:"095-333-4444",dept:"กองช่าง",room:"ห้องประชุมสภา",date:"2568-06-14",start:"08:30",end:"10:00",email:"",note:"",status:"rejected",ts:"2568-06-10 09:00"},
  ];
}

function updateSummary(){
  document.getElementById("sTotal").textContent=bookings.length;
  document.getElementById("sPending").textContent=bookings.filter(function(b){return b.status==="pending";}).length;
  document.getElementById("sApproved").textContent=bookings.filter(function(b){return b.status==="approved";}).length;
  document.getElementById("sRejected").textContent=bookings.filter(function(b){return b.status==="rejected";}).length;
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  el.classList.add("active");
  renderTable();
}

function renderTable(){
  var room=document.getElementById("filterRoom").value;
  var date=document.getElementById("filterDate").value;
  var filtered=bookings.filter(function(b){
    if(currentTab!=="all"&&b.status!==currentTab)return false;
    if(room&&b.room!==room)return false;
    if(date&&b.date!==date)return false;
    return true;
  });
  var statusLabel={pending:"รอการอนุมัติ",approved:"อนุมัติแล้ว",rejected:"ปฏิเสธ"};
  var statusClass={pending:"pill-pending",approved:"pill-approved",rejected:"pill-rejected"};
  var html="";
  filtered.forEach(function(b){
    var actions="";
    if(b.status==="pending"){
      actions='<button class="abtn abtn-approve" onclick="quickAction(\'"+b.id+"\',\'approved\')">✅ อนุมัติ</button>'+
               '<button class="abtn abtn-reject" onclick="quickAction(\'"+b.id+"\',\'rejected\')">❌ ปฏิเสธ</button>';
    }
    actions+='<button class="abtn abtn-view" onclick="viewDetail(\'"+b.id+"\')">🔍 ดู</button>';
    html+='<tr><td><strong>'+b.id+'</strong><br><span style="font-size:11px;color:var(--dust)">'+b.ts+'</span></td>'+
          '<td><strong>'+b.name+'</strong><br><span style="font-size:12px;color:var(--bark)">'+b.dept+'</span></td>'+
          '<td>'+b.room+'</td>'+
          '<td>'+b.date+'<br><span style="font-size:12px;color:var(--bark)">'+b.start+' – '+b.end+'</span></td>'+
          '<td><span class="status-pill '+statusClass[b.status]+'">'+statusLabel[b.status]+'</span></td>'+
          '<td><div class="action-btns">'+actions+'</div></td></tr>';
  });
  if(!html)html='<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div>ไม่พบรายการ</div></td></tr>';
  document.getElementById("bookingTbody").innerHTML=html;
}

function viewDetail(id){
  var b=bookings.find(function(x){return x.id===id;});
  if(!b)return;
  selectedBooking=b;
  var statusLabel={pending:"รอการอนุมัติ",approved:"อนุมัติแล้ว",rejected:"ปฏิเสธ"};
  var html=''+
    row("เลขที่จอง",b.id)+row("ชื่อผู้จอง",b.name)+row("เบอร์โทร",b.tel)+
    row("กอง/สำนัก",b.dept)+row("ห้องประชุม",b.room)+row("วันที่",b.date)+
    row("เวลา",b.start+" – "+b.end)+row("อีเมล",b.email||"-")+
    row("หมายเหตุ",b.note||"-")+row("สถานะ",statusLabel[b.status])+row("ส่งเมื่อ",b.ts);
  document.getElementById("modalBody").innerHTML=html;
  var act="";
  if(b.status==="pending"){
    act='<button class="mbtn mbtn-approve" onclick="confirmAction(\'approved\')">✅ อนุมัติ</button>'+
        '<button class="mbtn mbtn-reject" onclick="confirmAction(\'rejected\')">❌ ปฏิเสธ</button>';
  }
  act+='<button class="mbtn mbtn-cancel" onclick="closeModal()">ปิด</button>';
  document.getElementById("modalActions").innerHTML=act;
  document.getElementById("detailModal").classList.add("open");
}
function row(l,v){return '<div class="detail-row"><div class="detail-label">'+l+'</div><div class="detail-val">'+v+'</div></div>';}
function closeModal(){document.getElementById("detailModal").classList.remove("open");}

function quickAction(id,status){
  updateStatus(id,status);
}
function confirmAction(status){
  if(selectedBooking)updateStatus(selectedBooking.id,status);
  closeModal();
}

function updateStatus(id,status){
  var label={approved:"อนุมัติแล้ว",rejected:"ปฏิเสธ"};
  // ใช้ form POST เพื่อหลีกเลี่ยง CORS
  var form = document.createElement('form');
  form.method = 'POST';
  form.action = APPS_SCRIPT_URL;
  form.target = 'hidden_iframe';
  var input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'payload';
  input.value = JSON.stringify({action:"update",id:id,status:status});
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
  Promise.resolve({status:"ok"}).then(function(){
      var b=bookings.find(function(x){return x.id===id;});
      if(b)b.status=status;
      updateSummary();
      renderTable();
      showToast((status==="approved"?"✅ อนุมัติ":"❌ ปฏิเสธ")+" คำขอ "+id+" เรียบร้อยแล้ว");
    });
}


// JSONP callbacks
function receiveBookings(data){
  bookings = data.bookings || [];
  updateSummary();
  renderTable();
}

function updateCallback(data){
  // โหลดข้อมูลใหม่หลังอัปเดต
  loadBookings();
}

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3000);
}
</script>
<iframe name="hidden_iframe" style="display:none"></iframe>
</body>
</html>
